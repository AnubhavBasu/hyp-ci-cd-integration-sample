trigger:
- main

pool:
  vmImage: 'ubuntu-latest' 

steps:
  - task: Bash@3
    displayName: 'Install Dependencies and Run HyperExecute'
    inputs:
      targetType: 'inline'
      script: |
        # 1. Force install Maven on the Linux agent so HyperExecute can find it
        sudo apt-get update
        sudo apt-get install maven -y
        
        # 2. Download the Linux HyperExecute CLI
        wget https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
        chmod +x hyperexecute
        
        # 3. Execute the tests
        ./hyperexecute --user $(LT_USERNAME) --key $(LT_ACCESS_KEY) --config yaml/autosplit_linux.yaml
